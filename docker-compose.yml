version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: samcamping_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: samcamping
      POSTGRES_PASSWORD: samcamping123
      POSTGRES_DB: samcamping_cafe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - samcamping_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: samcamping_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@samcamping.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - samcamping_network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  samcamping_network:
    driver: bridge